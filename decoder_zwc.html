<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Décodeur ZWC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a18; padding: 2rem; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: #666; margin-bottom: 20px; }
  textarea {
    width: 100%; height: 140px; padding: 12px; font-size: 13px;
    border: 1px solid #d0cfc7; border-radius: 8px; background: #fff;
    resize: vertical; font-family: monospace;
  }
  button {
    margin-top: 10px; padding: 9px 20px; font-size: 14px;
    background: #fff; border: 1px solid #bbb; border-radius: 8px;
    cursor: pointer; font-family: inherit;
  }
  button:hover { background: #f0efeb; }
  .result { margin-top: 18px; }
  .box {
    background: #fff; border: 1px solid #d0cfc7; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .box label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #888; display: block; margin-bottom: 6px; }
  .box .val { font-family: monospace; font-size: 14px; color: #1a1a18; word-break: break-all; }
  .box .val.big { font-size: 22px; font-weight: 600; color: #1a6e3c; letter-spacing: .05em; }
  .chars { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .ch {
    font-size: 11px; padding: 3px 7px; border-radius: 4px;
    border: 1px solid #e0dfd7; background: #f9f8f4; font-family: monospace;
  }
  .ch.zwc0 { background: #fdf3e7; border-color: #e8c57a; color: #7a4e00; }
  .ch.zwc1 { background: #e8f0fd; border-color: #7aace8; color: #003a7a; }
  .none { font-size: 13px; color: #999; font-style: italic; }
</style>
</head>
<body>
<h1>Décodeur ZWC — Stéganographie textuelle</h1>
<p class="sub">Colle le texte Discord encodé ci-dessous. Les caractères zéro-largeur seront extraits et décodés automatiquement.</p>

<textarea id="input" placeholder="Colle le texte ici..."></textarea>
<button onclick="decode()">Analyser →</button>

<div class="result" id="result"></div>

<script>
const ZWS  = '\u200b'; // bit 0
const ZWNJ = '\u200c'; // bit 1

function decode() {
  const text = document.getElementById('input').value;
  const result = document.getElementById('result');

  if (!text.trim()) { result.innerHTML = ''; return; }

  // Extract bits
  let bits = '';
  let charMap = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === ZWS)  { bits += '0'; charMap.push({pos: i, bit: '0', prev: text[i-1] || ''}); }
    if (ch === ZWNJ) { bits += '1'; charMap.push({pos: i, bit: '1', prev: text[i-1] || ''}); }
  }

  if (bits.length === 0) {
    result.innerHTML = `<div class="box"><p class="none">Aucun caractère ZWC trouvé dans ce texte.</p></div>`;
    return;
  }

  // Decode binary to ASCII
  let decoded = '';
  for (let i = 0; i + 7 < bits.length; i += 8) {
    decoded += String.fromCharCode(parseInt(bits.slice(i, i+8), 2));
  }

  // Render
  let charsHTML = charMap.map(c =>
    `<span class="ch zwc${c.bit}" title="après '${c.prev}' (pos ${c.pos})">` +
    `[U+200${c.bit==='0'?'B':'C'}] → ${c.bit}</span>`
  ).join('');

  result.innerHTML = `
    <div class="box">
      <label>Message caché décodé</label>
      <div class="val big">${decoded || '—'}</div>
    </div>
    <div class="box">
      <label>Séquence binaire (${bits.length} bits)</label>
      <div class="val">${bits.match(/.{1,8}/g)?.join(' ') || bits}</div>
    </div>
    <div class="box">
      <label>Caractères ZWC détectés (${charMap.length})</label>
      <div class="chars">${charsHTML}</div>
    </div>
  `;
}
</script>
</body>
</html>
